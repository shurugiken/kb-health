name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile
        run: python -m py_compile kb_health_check.py
      - name: CLI help (no network, no API key)
        run: python kb_health_check.py --help
